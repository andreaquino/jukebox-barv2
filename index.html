<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portinha - Jukebox Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        portinhaBlue: '#1a365d',
                        portinhaGold: '#d4af37',
                        portinhaAmber: '#ffbf00',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #000; 
            font-family: 'Inter', sans-serif;
            color: #f3e5ab;
            min-height: 100vh;
        }

        /* Fundo com a foto da taverna */
        .bg-taverna {
            position: fixed; inset: 0;
            background-image: url('https://imgur.com/a/fHNGZqh'); /* USA A MESMA FOTO DA TV */
            background-size: cover; background-position: center;
            filter: brightness(0.2) contrast(1.2);
            z-index: -1;
        }

        /* Cartões estilo Madeira/Vidro escuro */
        .wood-panel {
            background: rgba(20, 10, 5, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        .btn-gold {
            background: #d4af37;
            color: #000;
            font-weight: 900;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .btn-gold:active { transform: scale(0.95); }

        /* Estilo do Input de pesquisa */
        .search-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: white;
            transition: all 0.3s ease;
        }
        .search-input:focus { border-color: #d4af37; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="bg-taverna"></div>

    <header class="w-full max-w-lg mb-8 wood-panel p-5 border-l-4 border-portinhaGold">
        <div class="flex gap-4 items-center">
            <div class="relative shrink-0">
                <img id="client-cover" src="https://via.placeholder.com/100" class="w-20 h-20 rounded-xl shadow-lg object-cover">
                <div class="absolute -bottom-1 -right-1 bg-portinhaGold p-1 rounded-full">
                    <i data-lucide="play" class="w-3 h-3 text-black fill-current"></i>
                </div>
            </div>
            <div class="overflow-hidden flex-1">
                <p class="text-[10px] uppercase tracking-widest text-portinhaGold font-bold mb-1">A tocar agora</p>
                <p id="client-title" class="font-black text-xl truncate text-white leading-tight">Carregando...</p>
                <p id="client-artist" class="text-white/50 text-sm italic">Portinha</p>
                <div class="w-full bg-white/5 h-1.5 rounded-full mt-3 overflow-hidden">
                    <div id="client-progress" class="bg-portinhaGold h-full rounded-full transition-all duration-1000"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="w-full max-w-lg flex-1">
        <section class="mb-8">
            <div class="relative flex items-center">
                <i data-lucide="search" class="absolute left-5 text-portinhaGold/50 w-5 h-5"></i>
                <input type="text" id="searchInput" oninput="debounceSearch()" placeholder="Pede a tua música..." class="search-input w-full rounded-2xl pl-14 pr-6 py-5 outline-none text-lg">
            </div>
            <div id="search-results" class="mt-4 flex flex-col gap-3"></div>
        </section>

        <section>
            <div class="flex items-center gap-3 mb-6 px-2">
                <i data-lucide="list-music" class="text-portinhaGold w-6 h-6"></i>
                <h2 class="text-2xl font-black italic text-white tracking-tighter">FILA DA TAVERNA</h2>
            </div>
            <div id="queue-list" class="flex flex-col gap-4 pb-20"></div>
        </section>
    </main>

    <footer class="mt-10 mb-6 text-center opacity-30">
        <h2 class="text-xl font-black italic tracking-tighter text-white">PORTINHA</h2>
        <p class="text-[8px] uppercase tracking-[0.5em] mt-1 text-portinhaGold">Sabores & Tradição</p>
    </footer>

    <script>
        const supabaseUrl = 'https://tgbyxogyrugjfggugigf.supabase.co';
        const supabaseKey = 'sb_publishable_MJFbecAQa8GZ4LdNb5ruew_9N9bg2ro';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        const MY_ID = localStorage.getItem('jukebox_user_id') || 'u_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('jukebox_user_id', MY_ID);

        async function initClient() {
            const { data } = await supabaseClient.from('playback_status').select('*').eq('id', 1).single();
            if (data) updateUI(data);
            supabaseClient.channel('c_playback').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'playback_status' }, payload => updateUI(payload.new)).subscribe();
        }

        function updateUI(data) {
            document.getElementById('client-title').innerText = data.title;
            document.getElementById('client-artist').innerText = data.artist;
            document.getElementById('client-cover').src = data.cover_url;
            document.getElementById('client-progress').style.width = (data.progress_ms / data.duration_ms * 100) + '%';
        }

        let timer;
        function debounceSearch() {
            clearTimeout(timer);
            timer = setTimeout(async () => {
                const q = document.getElementById('searchInput').value;
                if (q.length < 2) { document.getElementById('search-results').innerHTML = ""; return; }
                
                const tRes = await fetch('https://accounts.spotify.com/api/token', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Authorization': 'Basic ' + btoa('3351b90e625048618d7f976a4f4b5a5a:8bc683ac2c3d4c9ba31041a857b62537') }, body: 'grant_type=client_credentials' });
                const tData = await tRes.json();
                const res = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(q)}&type=track&limit=5`, { headers: { 'Authorization': 'Bearer ' + tData.access_token } });
                const data = await res.json();
                
                const results = document.getElementById('search-results');
                results.innerHTML = "";
                data.tracks.items.forEach(song => {
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-4 wood-panel p-4 active:scale-95 transition-all cursor-pointer";
                    div.onclick = () => addToQueue(song);
                    div.innerHTML = `<img src="${song.album.images[2].url}" class="w-12 h-12 rounded-lg shadow-lg"> <div class="flex-1 min-w-0"><p class="font-bold text-white text-sm truncate">${song.name}</p><p class="text-xs text-portinhaGold/70 truncate">${song.artists[0].name}</p></div> <i data-lucide="plus" class="text-portinhaGold"></i>`;
                    results.appendChild(div);
                });
                lucide.createIcons();
            }, 600);
        }

        async function addToQueue(song) {
            const { data: count } = await supabaseClient.from('queue').select('id').eq('user_id', MY_ID).eq('status', 'pending');
            if (count && count.length >= 3) return alert("Máximo 3 músicas!");
            const name = prompt("Teu nome?");
            if(!name) return;
            await supabaseClient.from('queue').insert([{ title: song.name, artist: song.artists[0].name, cover_url: song.album.images[0].url, spotify_uri: song.uri, user_name: name, user_id: MY_ID, status: 'pending', votes: 0 }]);
            document.getElementById('searchInput').value = ""; document.getElementById('search-results').innerHTML = "";
        }

        async function fetchQueue() {
            const { data } = await supabaseClient.from('queue').select('*').eq('status', 'pending').order('votes', { ascending: false });
            const container = document.getElementById('queue-list'); container.innerHTML = "";
            (data || []).forEach(song => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-4 wood-panel p-4 border-l-2 border-portinhaGold/30";
                div.innerHTML = `<img src="${song.cover_url}" class="w-14 h-14 rounded-xl shadow-md"> <div class="flex-1 min-w-0"><p class="font-bold text-white text-sm truncate">${song.title}</p><p class="text-[10px] text-portinhaGold uppercase font-black tracking-widest mt-1">${song.user_name}</p></div> <button onclick="upvote('${song.id}')" class="btn-gold px-4 py-2 rounded-xl text-xs flex items-center gap-2">❤️ ${song.votes}</button>`;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        async function upvote(id) {
            const { data: v } = await supabaseClient.from('votes').select('*').eq('song_id', id).eq('user_id', MY_ID);
            if (v && v.length > 0) return alert("Já votaste!");
            await supabaseClient.from('votes').insert([{ song_id: id, user_id: MY_ID }]);
            const { data: s } = await supabaseClient.from('queue').select('votes').eq('id', id).single();
            await supabaseClient.from('queue').update({ votes: (s.votes || 0) + 1 }).eq('id', id);
        }

        initClient(); fetchQueue();
        supabaseClient.channel('q_client').on('postgres_changes', { event: '*', schema: 'public', table: 'queue' }, fetchQueue).subscribe();
        lucide.createIcons();
    </script>
</body>
</html>
