<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portinha - Jukebox Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        portinhaBlue: '#1a365d',
                        portinhaTerracotta: '#c05621',
                        portinhaBeige: '#f3e5ab',
                    },
                    fontFamily: {
                        serif: ['Georgia', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f3e5ab; color: #1a365d; font-family: 'serif'; }
        .rustic-card {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(26, 54, 93, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 20px;
        }
        .btn-portinha {
            background-color: #1a365d;
            color: #f3e5ab;
            transition: all 0.3s ease;
        }
        .btn-portinha:active { transform: scale(0.95); }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <header class="w-full max-w-xl mb-8 rustic-card p-5 shadow-sm">
        <p class="text-[10px] uppercase tracking-[0.2em] mb-3 opacity-60 font-sans font-bold">A tocar no bar</p>
        <div class="flex gap-4 items-center">
            <img id="client-cover" src="https://via.placeholder.com/100" class="w-20 h-20 rounded-xl shadow-md object-cover border border-portinhaBlue/10">
            <div class="overflow-hidden flex-1">
                <p id="client-title" class="font-bold text-xl truncate leading-tight">Sincronizando...</p>
                <p id="client-artist" class="text-portinhaBlue/60 text-sm italic">Portinha</p>
                <div class="w-full bg-portinhaBlue/10 h-1.5 rounded-full mt-4">
                    <div id="client-progress" class="bg-portinhaBlue h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="w-full max-w-xl flex-1">
        <section class="mb-10 relative">
            <div class="relative flex items-center">
                <i data-lucide="search" class="absolute left-5 text-portinhaBlue/40 w-5 h-5"></i>
                <input type="text" id="searchInput" oninput="debounceSearch()" placeholder="Escolhe a tua música..." class="w-full bg-white/50 border border-portinhaBlue/10 rounded-2xl pl-14 pr-6 py-5 outline-none focus:border-portinhaTerracotta text-lg transition-all shadow-inner">
            </div>
            <div id="search-results" class="mt-4 flex flex-col gap-2"></div>
        </section>

        <section>
            <div class="flex items-center gap-3 mb-6">
                <i data-lucide="music-2" class="text-portinhaTerracotta w-6 h-6"></i>
                <h2 class="text-2xl font-bold italic">Próximas Escolhas</h2>
            </div>
            <div id="queue-list" class="flex flex-col gap-4"></div>
        </section>
    </main>

    <footer class="mt-16 mb-8 text-center border-t border-portinhaBlue/5 pt-8 w-full max-w-xs">
        <h2 class="text-xl font-black italic tracking-tighter opacity-80">PORTINHA</h2>
        <p class="text-[9px] uppercase tracking-[0.4em] opacity-40 mt-1">Sabores e Tradição</p>
    </footer>

    <script>
        const supabaseUrl = 'https://tgbyxogyrugjfggugigf.supabase.co';
        const supabaseKey = 'sb_publishable_MJFbecAQa8GZ4LdNb5ruew_9N9bg2ro';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        const MY_ID = localStorage.getItem('jukebox_user_id') || 'u_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('jukebox_user_id', MY_ID);

        // --- SINCRONIZAÇÃO COM A TV ---
        async function initClient() {
            const { data } = await supabaseClient.from('playback_status').select('*').eq('id', 1).single();
            if (data) updateClientUI(data);
            supabaseClient.channel('c_playback').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'playback_status' }, payload => updateClientUI(payload.new)).subscribe();
        }

        function updateClientUI(data) {
            document.getElementById('client-title').innerText = data.title;
            document.getElementById('client-artist').innerText = data.artist;
            document.getElementById('client-cover').src = data.cover_url;
            document.getElementById('client-progress').style.width = (data.progress_ms / data.duration_ms * 100) + '%';
        }

        // --- PESQUISA SPOTIFY ---
        let searchTimer;
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(async () => {
                const query = document.getElementById('searchInput').value;
                if (query.length < 2) {
                    document.getElementById('search-results').innerHTML = "";
                    return;
                }
                
                const tokenRes = await fetch('https://accounts.spotify.com/api/token', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Authorization': 'Basic ' + btoa('3351b90e625048618d7f976a4f4b5a5a:8bc683ac2c3d4c9ba31041a857b62537') }, 
                    body: 'grant_type=client_credentials' 
                });
                const tokenData = await tokenRes.json();
                
                const res = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=5`, { headers: { 'Authorization': 'Bearer ' + tokenData.access_token } });
                const data = await res.json();
                
                const results = document.getElementById('search-results');
                results.innerHTML = "";
                data.tracks.items.forEach(song => {
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-4 rustic-card p-3 shadow-sm active:bg-white/60 transition-colors cursor-pointer";
                    div.onclick = () => addToQueue(song);
                    div.innerHTML = `
                        <img src="${song.album.images[2].url}" class="w-12 h-12 rounded-lg">
                        <div class="flex-1 overflow-hidden">
                            <p class="font-bold text-sm truncate">${song.name}</p>
                            <p class="text-xs opacity-60 italic">${song.artists[0].name}</p>
                        </div>
                        <i data-lucide="plus-circle" class="w-5 h-5 text-portinhaTerracotta"></i>
                    `;
                    results.appendChild(div);
                });
                lucide.createIcons();
            }, 600);
        }

        async function addToQueue(song) {
            const { data: count } = await supabaseClient.from('queue').select('id').eq('user_id', MY_ID).eq('status', 'pending');
            if (count && count.length >= 3) return alert("Já tens 3 músicas na fila. Espera que toquem!");
            
            const name = prompt("Como te chamas?");
            if (!name) return;

            await supabaseClient.from('queue').insert([{ 
                title: song.name, artist: song.artists[0].name, cover_url: song.album.images[0].url, 
                spotify_uri: song.uri, user_name: name, user_id: MY_ID, status: 'pending', votes: 0 
            }]);
            
            document.getElementById('searchInput').value = "";
            document.getElementById('search-results').innerHTML = "";
            alert("Boa escolha! Já está na fila.");
        }

        // --- GESTÃO DA FILA ---
        async function fetchQueue() {
            const { data } = await supabaseClient.from('queue').select('*').eq('status', 'pending').order('votes', { ascending: false });
            const container = document.getElementById('queue-list');
            container.innerHTML = "";

            (data || []).forEach(song => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-4 rustic-card p-4 shadow-sm";
                div.innerHTML = `
                    <img src="${song.cover_url}" class="w-14 h-14 rounded-xl shadow-sm border border-portinhaBlue/5">
                    <div class="flex-1 overflow-hidden">
                        <p class="font-bold text-sm truncate">${song.title}</p>
                        <p class="text-[10px] uppercase tracking-widest opacity-50 font-sans font-bold">Por: ${song.user_name}</p>
                    </div>
                    <button onclick="upvote('${song.id}')" class="btn-portinha px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2">
                        <i data-lucide="heart" class="w-3 h-3"></i> ${song.votes}
                    </button>
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        async function upvote(id) {
            const { data: v } = await supabaseClient.from('votes').select('*').eq('song_id', id).eq('user_id', MY_ID);
            if (v && v.length > 0) return alert("Já deste o teu voto a esta música!");
            
            await supabaseClient.from('votes').insert([{ song_id: id, user_id: MY_ID }]);
            const { data: s } = await supabaseClient.from('queue').select('votes').eq('id', id).single();
            await supabaseClient.from('queue').update({ votes: (s.votes || 0) + 1 }).eq('id', id);
        }

        initClient();
        fetchQueue();
        supabaseClient.channel('q_client').on('postgres_changes', { event: '*', schema: 'public', table: 'queue' }, fetchQueue).subscribe();
        lucide.createIcons();
    </script>
</body>
</html>
