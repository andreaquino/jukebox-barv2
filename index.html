<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portinha - Jukebox Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; color: #f3e5ab; min-height: 100vh; margin: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), url('bar_background_portinha.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed; background-color: #000;
        }
        .wood-panel { background: rgba(15, 7, 5, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 24px; }
        .logo-gold-filter { filter: brightness(0) saturate(100%) invert(80%) sepia(59%) saturate(415%) hue-rotate(352deg) brightness(89%) contrast(89%); width: 120px; opacity: 0.8; cursor: pointer; }
        .progress-bar { background: #d4af37; height: 100%; transition: width 1s linear; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <header class="w-full max-w-lg mb-8 wood-panel p-5 border-l-4 border-[#d4af37]">
        <div class="flex gap-4 items-center">
            <img id="client-cover" src="https://via.placeholder.com/100" class="w-20 h-20 rounded-xl shadow-2xl border border-white/5">
            <div class="overflow-hidden flex-1">
                <p class="text-[10px] uppercase tracking-[0.2em] text-[#d4af37] font-bold mb-1">No Ar na Portinha</p>
                <h2 id="client-title" class="font-black text-xl truncate text-white">Sincronizando...</h2>
                <p id="client-artist" class="text-white/50 text-sm italic">Carregando</p>
                <div class="w-full bg-white/5 h-1.5 rounded-full mt-3 overflow-hidden">
                    <div id="client-progress" class="progress-bar" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="w-full max-w-lg flex-1">
        <input type="text" id="searchInput" oninput="debounceSearch()" placeholder="Pesquisa..." class="w-full bg-black/60 border border-[#d4af37]/30 rounded-2xl px-6 py-5 text-white outline-none mb-8">
        <div id="search-results" class="mb-8 flex flex-col gap-3"></div>
        
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black italic text-white uppercase tracking-tighter">Fila da Taverna</h2>
            <span id="admin-indicator" class="hidden text-[10px] bg-red-600 text-white px-2 py-1 rounded-full font-bold">MODO VETO</span>
        </div>
        
        <div id="queue-list" class="flex flex-col gap-4 pb-24"></div>
    </main>

    <footer class="mt-10 mb-12 text-center flex flex-col items-center">
        <img src="logo_portinha.png" 
             id="footer-logo"
             alt="Portinha Logo" 
             class="logo-gold-filter mb-3"
             onmousedown="startAdminTimer()" 
             onmouseup="clearAdminTimer()"
             ontouchstart="startAdminTimer()" 
             ontouchend="clearAdminTimer()">
        <h2 class="text-sm font-black italic tracking-[0.4em] text-white opacity-40">PORTINHA</h2>
    </footer>

    <script>
        const supabaseUrl = 'https://tgbyxogyrugjfggugigf.supabase.co';
        const supabaseKey = 'sb_publishable_MJFbecAQa8GZ4LdNb5ruew_9N9bg2ro';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        const MY_ID = localStorage.getItem('jukebox_user_id') || 'u_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('jukebox_user_id', MY_ID);

        let adminMode = false;
        let adminTimer;

        // --- LÓGICA DO MODO VETO SECRETO ---
        function startAdminTimer() {
            adminTimer = setTimeout(() => {
                const pass = prompt("Password de Admin:");
                if(pass === "1234") {
                    adminMode = !adminMode;
                    document.getElementById('admin-indicator').classList.toggle('hidden');
                    fetchQueue();
                    alert(adminMode ? "Modo Veto Ativo! 🍷🔨" : "Modo Cliente Ativo.");
                }
            }, 3000); // 3 Segundos a carregar no logo
        }

        function clearAdminTimer() { clearTimeout(adminTimer); }

        async function removeSong(id) {
            if(!confirm("Remover esta música da lista?")) return;
            // Marcamos como 'played' para ela desaparecer da fila mas manter o registo
            await supabaseClient.from('queue').update({ status: 'played' }).eq('id', id);
        }

        // --- RESTO DA LÓGICA (Sincro, Busca, Votos) ---
        async function initSync() {
            const { data } = await supabaseClient.from('playback_status').select('*').eq('id', 1).single();
            if (data) updateUI(data);
            supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'playback_status' }, payload => updateUI(payload.new)).subscribe();
        }

        function updateUI(data) {
            if(!data) return;
            document.getElementById('client-title').innerText = data.title;
            document.getElementById('client-artist').innerText = data.artist;
            document.getElementById('client-cover').src = data.cover_url;
            document.getElementById('client-progress').style.width = ((data.progress_ms / data.duration_ms) * 100) + '%';
        }

        async function fetchQueue() {
            const { data } = await supabaseClient.from('queue').select('*').eq('status', 'pending').order('votes', { ascending: false });
            const container = document.getElementById('queue-list'); container.innerHTML = "";
            (data || []).forEach(song => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-4 wood-panel p-4 border-l-2 border-[#d4af37]/30";
                div.innerHTML = `
                    <img src="${song.cover_url}" class="w-14 h-14 rounded-xl">
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-white text-sm truncate">${song.title}</p>
                        <p class="text-[10px] text-[#d4af37] font-black tracking-widest mt-1 uppercase">${song.user_name}</p>
                    </div>
                    ${adminMode ? 
                        `<button onclick="removeSong('${song.id}')" class="bg-red-600/20 text-red-500 p-3 rounded-xl border border-red-600/50"><i data-lucide="trash-2"></i></button>` : 
                        `<button onclick="upvote('${song.id}')" class="bg-[#d4af37] text-black px-4 py-2 rounded-xl text-xs font-black">❤️ ${song.votes}</button>`
                    }
                `;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        // --- (Funções de upvote, addToQueue e debounceSearch iguais às anteriores) ---
        // Podes manter as que já tinhas aqui em baixo
        
        let cachedToken = null;
        async function getSpotifyToken() {
            if (cachedToken) return cachedToken;
            const res = await fetch('https://accounts.spotify.com/api/token', { method: 'POST', headers: { 'Authorization': 'Basic ' + btoa('3351b90e625048618d7f976a4f4b5a5a:8bc683ac2c3d4c9ba31041a857b62537') }, body: 'grant_type=client_credentials' });
            const data = await res.json();
            return (cachedToken = data.access_token);
        }

        async function debounceSearch() {
            const q = document.getElementById('searchInput').value;
            if(q.length < 2) { document.getElementById('search-results').innerHTML = ""; return; }
            clearTimeout(window.searchTimer);
            window.searchTimer = setTimeout(async () => {
                const token = await getSpotifyToken();
                const res = await fetch(`https://api.spotify.com/v1/search?q=$${encodeURIComponent(q)}&type=track&limit=5`, { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                const results = document.getElementById('search-results'); results.innerHTML = "";
                data.tracks.items.forEach(song => {
                    const div = document.createElement('div');
                    div.className = "flex items-center gap-4 wood-panel p-4 active:scale-95 transition-all";
                    div.onclick = () => addToQueue(song);
                    div.innerHTML = `<img src="${song.album.images[2].url}" class="w-12 h-12 rounded-lg"> <div class="flex-1 min-w-0"><p class="font-bold text-white text-sm truncate">${song.name}</p><p class="text-xs text-[#d4af37]/70 truncate">${song.artists[0].name}</p></div> <i data-lucide="plus" class="text-[#d4af37]"></i>`;
                    results.appendChild(div);
                });
                lucide.createIcons();
            }, 300);
        }

        async function addToQueue(song) {
            const { data: last } = await supabaseClient.from('queue').select('created_at').eq('user_id', MY_ID).order('created_at', { ascending: false }).limit(1);
            if (last?.length > 0 && (new Date() - new Date(last[0].created_at)) / 60000 < 10) return alert("Podes pedir outra música daqui a pouco! 🍷");
            let name = prompt("Teu nome?");
            if(!name || name.length < 2) return;
            await supabaseClient.from('queue').insert([{ title: song.name, artist: song.artists[0].name, cover_url: song.album.images[0].url, spotify_uri: song.uri, user_name: name.substring(0,15), user_id: MY_ID, status: 'pending', votes: 0 }]);
            document.getElementById('searchInput').value = ""; document.getElementById('search-results').innerHTML = "";
        }

        async function upvote(id) {
            const { data: v } = await supabaseClient.from('votes').select('*').eq('song_id', id).eq('user_id', MY_ID);
            if (v?.length > 0) return alert("Já votaste!");
            await supabaseClient.from('votes').insert([{ song_id: id, user_id: MY_ID }]);
            const { data: s } = await supabaseClient.from('queue').select('votes').eq('id', id).single();
            await supabaseClient.from('queue').update({ votes: (s.votes || 0) + 1 }).eq('id', id);
        }

        initSync(); fetchQueue();
        supabaseClient.channel('q').on('postgres_changes', { event: '*', schema: 'public', table: 'queue' }, fetchQueue).subscribe();
        lucide.createIcons();
    </script>
</body>
</html>
