<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portinha TV - 4K Smart System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body, html { background-color: #000; color: white; margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden !important; font-family: 'Inter', sans-serif; }
        #bg-blur { position: fixed; inset: 0; background-size: cover; background-position: center; filter: blur(100px) brightness(0.22) saturate(1.8); transform: scale(1.1); z-index: 1; transition: background-image 2.5s ease-in-out; }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 100%); z-index: 2; }
        #main-content { position: relative; z-index: 10; display: flex; flex-direction: column; height: 100vh; width: 100vw; padding: 6vh 5vw; box-sizing: border-box; opacity: 0; transition: opacity 1.2s ease; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.07); }
        .progress-fill { background: #ffffff; height: 100%; border-radius: 99px; box-shadow: 0 0 30px rgba(255, 255, 255, 0.5); }
        
        /* ESTILO QR CODE */
        #qrcode-container {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
            display: inline-block;
        }
        #qrcode-container img { margin: 0 auto; }

        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .admin-trigger { position: fixed; top: 0; left: 0; width: 150px; height: 150px; z-index: 100; }
        .admin-menu { position: fixed; top: 40px; left: 40px; z-index: 101; display: none; background: rgba(0,0,0,0.95); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .admin-trigger:hover + .admin-menu, .admin-menu:hover { display: flex; flex-direction: column; gap: 15px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 class="text-[#d4af37] text-[5rem] font-[900] italic mb-8 tracking-tighter">PORTINHA 🔐</h2>
        <input type="password" id="passInput" placeholder="Pass" class="bg-white/5 border border-[#d4af37]/20 rounded-3xl px-8 py-5 text-center text-4xl text-white outline-none focus:border-white w-[25vw]">
        <button onclick="checkPass()" class="mt-8 bg-white text-black px-12 py-4 rounded-full text-2xl font-black">ENTRAR</button>
    </div>

    <div id="bg-blur"></div>
    <div class="vignette"></div>

    <div class="admin-trigger"></div>
    <div class="admin-menu">
        <button onclick="loginSpotify()" class="bg-[#1DB954] text-black px-8 py-3 rounded-full font-black text-xl">LOGIN SPOTIFY</button>
        <button id="auto-btn" onclick="toggleAutoMode()" class="bg-white/10 text-white px-8 py-3 rounded-full font-black text-xl">AUTO-NEXT: OFF</button>
    </div>

    <div id="main-content">
        <div class="flex-1 flex items-center gap-[6vw] min-w-0">
            <div class="w-[32vw] flex-shrink-0">
                <img id="tv-cover" src="" class="w-full aspect-square rounded-[4vh] shadow-2xl border border-white/5 object-cover">
            </div>

            <div class="flex-1 min-w-0 flex flex-col justify-center">
                <h1 id="tv-title" class="text-[6vw] font-[900] tracking-tighter leading-[1] mb-6 truncate italic">...</h1>
                <p id="tv-artist" class="text-[2.5vw] text-white/40 font-medium mb-12 truncate italic">Sincronizando...</p>
                
                <div class="flex items-center gap-8">
                    <div id="tv-suggester-box" class="hidden inline-flex items-center gap-6 px-8 py-4 glass-panel rounded-[20px] border-l-[0.8vw] border-l-[#d4af37]">
                        <span class="text-[1.4vw] font-black uppercase tracking-widest text-white/80">PEDIDO DE: <span id="tv-suggester" class="text-[#d4af37]">---</span></span>
                    </div>

                    <div class="glass-panel p-6 rounded-[30px] flex items-center gap-6">
                        <div id="qrcode-container"></div>
                        <div>
                            <p class="text-[#d4af37] text-xl font-black uppercase tracking-widest leading-none">Pede a tua</p>
                            <p class="text-white text-3xl font-black italic">MÚSICA</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-[20vw] glass-panel rounded-[4vh] p-8 h-[70vh] flex flex-col flex-shrink-0">
                <div class="flex items-center gap-4 mb-8 border-b border-white/5 pb-6 text-white/20">
                    <i data-lucide="list-music" class="w-6 h-6"></i>
                    <h2 class="text-xl font-black uppercase tracking-widest italic">A Seguir</h2>
                </div>
                <div id="tv-queue-list" class="flex flex-col gap-6 overflow-y-auto pr-2"></div>
            </div>
        </div>

        <div class="h-[10vh] flex flex-col justify-end">
            <div class="flex justify-between items-end mb-4 px-2 text-3xl font-black font-mono opacity-20">
                <span id="tv-current-time">0:00</span>
                <span id="tv-total-time">0:00</span>
            </div>
            <div class="bg-white/5 h-3 rounded-full overflow-hidden">
                <div id="tv-progress" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script>
        // ... (Script Supabase igual ao anterior) ...
        const supabaseUrl = 'https://tgbyxogyrugjfggugigf.supabase.co';
        const supabaseKey = 'sb_publishable_MJFbecAQa8GZ4LdNb5ruew_9N9bg2ro';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        const spotifyClientId = '3351b90e625048618d7f976a4f4b5a5a';
        let spotifyAccessToken = localStorage.getItem('spotify_token');
        let durationMs = 0; let localProgressMs = 0;
        const redirectUri = window.location.href.split('?')[0].split('#')[0];

        // --- GERA O QR CODE PARA O INDEX.HTML ---
        function generateQR() {
            const indexUrl = window.location.href.replace('tv.html', 'index.html');
            new QRCode(document.getElementById("qrcode-container"), {
                text: indexUrl,
                width: 120,
                height: 120,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function checkPass() {
            if(document.getElementById('passInput').value === "1234") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
                generateQR(); // Gera o QR Code ao entrar
                initSystem();
            } else { alert("Pass Errada!"); }
        }

        // ... (resto das funções monitor, updateUI, fetchQueue iguais) ...
        async function monitor() {
            if (!spotifyAccessToken) return;
            try {
                const res = await fetch("https://api.spotify.com/v1/me/player", { headers: { 'Authorization': 'Bearer ' + spotifyAccessToken } });
                if (res.status === 200) {
                    const data = await res.json();
                    if (!data.item) return;
                    localProgressMs = data.progress_ms; durationMs = data.item.duration_ms;
                    updateUI(data.item.name, data.item.artists[0].name, data.item.album.images[0].url);
                }
            } catch (e) { console.error(e); }
        }

        function updateUI(title, artist, cover) {
            document.getElementById('tv-title').innerText = title;
            document.getElementById('tv-artist').innerText = artist;
            document.getElementById('tv-cover').src = cover;
            document.getElementById('bg-blur').style.backgroundImage = `url('${cover}')`;
            document.getElementById('tv-total-time').innerText = format(durationMs);
        }

        function format(ms) { const min = Math.floor(ms / 60000); const sec = Math.floor((ms % 60000) / 1000); return min + ":" + (sec < 10 ? '0' : '') + sec; }

        async function fetchQueue() {
            const { data } = await supabaseClient.from('queue').select('*').eq('status', 'pending').order('votes', { ascending: false }).limit(5);
            const container = document.getElementById('tv-queue-list'); container.innerHTML = "";
            data?.forEach(s => {
                const div = document.createElement('div'); div.className = "flex items-center gap-4";
                div.innerHTML = `<img src="${s.cover_url}" class="w-16 h-16 rounded-xl object-cover"> <div class="flex-1 min-w-0"><p class="text-xl font-black truncate text-white italic leading-tight">${s.title}</p><p class="text-sm text-[#d4af37] uppercase font-black truncate mt-1">${s.user_name}</p></div>`;
                container.appendChild(div);
            });
        }

        function initSystem() {
            setInterval(monitor, 2000);
            setInterval(() => { if(durationMs > 0) { localProgressMs += 1000; document.getElementById('tv-progress').style.width = (localProgressMs/durationMs*100)+'%'; document.getElementById('tv-current-time').innerText = format(localProgressMs); } }, 1000);
            supabaseClient.channel('q_tv').on('postgres_changes', { event: '*', schema: 'public', table: 'queue' }, fetchQueue).subscribe();
            fetchQueue();
        }

        lucide.createIcons();
    </script>
</body>
</html>
