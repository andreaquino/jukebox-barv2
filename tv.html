<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portinha TV - 4K Ultra System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* IMPEDIR QUALQUER SCROLL HORIZONTAL OU VERTICAL */
        html, body { 
            background-color: #000 !important; 
            color: white; 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            overflow: hidden !important; 
            font-family: 'Inter', sans-serif; 
        }
        
        /* CAMADA DO ÁLBUM DESFOCADO (O GLOW) */
        #bg-blur {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            filter: blur(120px) brightness(0.2) saturate(2); /* Brilho ajustado para não cansar a vista */
            transform: scale(1.4);
            z-index: 0; 
            transition: background-image 2s ease-in-out;
        }

        /* CAMADA DE ESCURIDÃO PARA DAR FOCO AO CONTEÚDO */
        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        .glass-panel { 
            background: rgba(0, 0, 0, 0.45); 
            backdrop-filter: blur(60px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        .progress-fill { 
            background: #ffffff; 
            height: 100%; 
            border-radius: 99px; 
            transition: width 1s linear; 
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.8); 
        }

        #lock-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        #main-content { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; }

        /* Menu Admin Oculto */
        .admin-trigger { position: fixed; top: 0; left: 0; width: 150px; height: 150px; z-index: 100; }
        .admin-menu { position: fixed; top: 40px; left: 40px; z-index: 101; display: none; background: rgba(0,0,0,0.95); padding: 40px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); }
        .admin-trigger:hover + .admin-menu, .admin-menu:hover { display: flex; flex-direction: column; gap: 20px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 class="text-[#d4af37] text-7xl font-[900] italic mb-12 tracking-tighter">PORTINHA 🔐</h2>
        <input type="password" id="passInput" placeholder="Password" class="bg-white/5 border border-[#d4af37]/30 rounded-3xl px-12 py-6 text-center text-5xl text-white outline-none focus:border-white w-[500px]">
        <button onclick="checkPass()" class="mt-12 bg-white text-black px-20 py-6 rounded-full text-3xl font-black">ENTRAR</button>
    </div>

    <div id="bg-blur"></div>
    <div class="vignette"></div>

    <div class="admin-trigger"></div>
    <div class="admin-menu">
        <button onclick="loginSpotify()" class="bg-[#1DB954] text-black px-10 py-4 rounded-full font-black text-xl">LOGIN SPOTIFY</button>
        <button id="auto-btn" onclick="toggleAutoMode()" class="bg-white/10 text-white px-10 py-4 rounded-full font-black text-xl">AUTO-NEXT: OFF</button>
    </div>

    <div id="main-content" class="p-24 opacity-0 transition-opacity duration-1000">
        
        <div class="flex-1 flex items-center gap-24 mb-20 min-w-0">
            <div class="shrink-0">
                <img id="tv-cover" src="" class="w-[650px] h-[650px] md:w-[850px] md:h-[850px] rounded-[60px] shadow-[0_80px_150px_rgba(0,0,0,0.9)] border border-white/10 object-cover">
            </div>

            <div class="flex-1 flex flex-col justify-center min-w-0">
                <h1 id="tv-title" class="text-[10rem] font-[900] tracking-tighter leading-[0.95] mb-12 truncate italic">...</h1>
                <p id="tv-artist" class="text-7xl text-white/40 font-medium mb-16 truncate italic">Sincronizando...</p>
                
                <div id="tv-suggester-box" class="hidden inline-flex items-center gap-8 px-12 py-6 glass-panel rounded-[35px] w-fit border-l-[15px] border-l-[#d4af37]">
                    <span class="text-3xl font-black uppercase tracking-[0.3em] text-white/90">PEDIDO DE: <span id="tv-suggester" class="text-[#d4af37]">---</span></span>
                </div>
            </div>

            <div class="w-[650px] shrink-0 glass-panel rounded-[80px] p-16 h-full max-h-[850px] flex flex-col self-stretch">
                <div class="flex items-center gap-6 mb-12 border-b border-white/10 pb-10">
                    <i data-lucide="list-music" class="text-[#d4af37] w-12 h-12"></i>
                    <h2 class="text-3xl font-black uppercase tracking-[0.4em] text-white/30 italic">Próximas</h2>
                </div>
                <div id="tv-queue-list" class="flex flex-col gap-12 overflow-y-auto pr-4"></div>
            </div>
        </div>

        <div class="w-full mt-auto mb-4">
            <div class="flex justify-between items-end mb-10 px-8">
                <span id="tv-current-time" class="text-5xl font-black font-mono opacity-20">0:00</span>
                <span id="tv-total-time" class="text-5xl font-black font-mono opacity-20">0:00</span>
            </div>
            <div class="bg-white/10 h-7 rounded-full relative overflow-hidden border border-white/5">
                <div id="tv-progress" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tgbyxogyrugjfggugigf.supabase.co';
        const supabaseKey = 'sb_publishable_MJFbecAQa8GZ4LdNb5ruew_9N9bg2ro';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        const spotifyClientId = '3351b90e625048618d7f976a4f4b5a5a';
        
        let spotifyAccessToken = localStorage.getItem('spotify_token');
        let refreshToken = localStorage.getItem('refresh_token');
        let expiresAt = localStorage.getItem('expires_at');
        let autoMode = false;
        let isProcessingAuto = false;
        let durationMs = 0;
        let localProgressMs = 0;
        const redirectUri = window.location.href.split('?')[0].split('#')[0];

        function checkPass() {
            if(document.getElementById('passInput').value === "1234") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
                initSystem();
            } else { alert("Errada!"); }
        }

        async function loginSpotify() {
            const verifier = Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b => b.toString(16).padStart(2, '0')).join('');
            localStorage.setItem('code_verifier', verifier);
            const challenge = btoa(String.fromCharCode.apply(null, new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier))))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            window.location.href = `https://accounts.spotify.com/authorize?client_id=${spotifyClientId}&response_type=code&redirect_uri=${encodeURIComponent(redirectUri)}&scope=user-modify-playback-state%20user-read-playback-state%20user-read-currently-playing&code_challenge_method=S256&code_challenge=${challenge}`;
        }

        async function exchangeCode(code) {
            const params = new URLSearchParams({ client_id: spotifyClientId, grant_type: 'authorization_code', code, redirect_uri: redirectUri, code_verifier: localStorage.getItem('code_verifier') });
            const res = await fetch('https://accounts.spotify.com/api/token', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params });
            const data = await res.json();
            if (data.access_token) {
                localStorage.setItem('spotify_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                localStorage.setItem('expires_at', Math.floor(Date.now() / 1000) + data.expires_in);
                window.location.href = redirectUri;
            }
        }

        async function monitor() {
            if (!spotifyAccessToken) return;
            try {
                const res = await fetch("https://api.spotify.com/v1/me/player", { headers: { 'Authorization': 'Bearer ' + spotifyAccessToken } });
                if (res.status === 200) {
                    const data = await res.json();
                    if (!data.item) return;
                    localProgressMs = data.progress_ms;
                    durationMs = data.item.duration_ms;
                    
                    const isSuggester = (localStorage.getItem('last_uri') === data.item.uri);
                    const currentUser = isSuggester ? localStorage.getItem('last_user') : "Spotify";

                    await supabaseClient.from('playback_status').upsert({
                        id: 1, title: data.item.name, artist: data.item.artists[0].name, cover_url: data.item.album.images[0].url, 
                        progress_ms: data.progress_ms, duration_ms: data.item.duration_ms, user_name: currentUser
                    });

                    updateUI(data.item.name, data.item.artists[0].name, data.item.album.images[0].url, isSuggester, currentUser);

                    if (autoMode && (durationMs - localProgressMs < 15000) && !isProcessingAuto) {
                        isProcessingAuto = true;
                        playNext();
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function playNext() {
            const { data } = await supabaseClient.from('queue').select('*').eq('status', 'pending').order('votes', { ascending: false }).limit(1);
            if (data?.length > 0) {
                const s = data[0];
                await fetch(`https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(s.spotify_uri)}`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + spotifyAccessToken } });
                localStorage.setItem('last_uri', s.spotify_uri);
                localStorage.setItem('last_user', s.user_name);
                await supabaseClient.from('queue').update({ status: 'played' }).eq('id', s.id);
            }
        }

        function updateUI(title, artist, cover, isSuggester, user) {
            document.getElementById('tv-title').innerText = title;
            document.getElementById('tv-artist').innerText = artist;
            document.getElementById('tv-cover').src = cover;
            // AQUI É ONDE O GLOW VOLTA A APARECER:
            document.getElementById('bg-blur').style.backgroundImage = `url('${cover}')`;
            document.getElementById('tv-total-time').innerText = format(durationMs);
            
            if (isSuggester) {
                document.getElementById('tv-suggester-box').classList.remove('hidden');
                document.getElementById('tv-suggester').innerText = user;
            } else { 
                document.getElementById('tv-suggester-box').classList.add('hidden'); 
            }
        }

        function format(ms) { const min = Math.floor(ms / 60000); const sec = Math.floor((ms % 60000) / 1000); return min + ":" + (sec < 10 ? '0' : '') + sec; }
        function toggleAutoMode() { autoMode = !autoMode; document.getElementById('auto-btn').innerText = `AUTO-NEXT: ${autoMode ? 'ON' : 'OFF'}`; }

        async function fetchQueue() {
            const { data } = await supabaseClient.from('queue').select('*').eq('status', 'pending').order('votes', { ascending: false }).limit(5);
            const container = document.getElementById('tv-queue-list'); container.innerHTML = "";
            data?.forEach(s => {
                const div = document.createElement('div'); div.className = "flex items-center gap-10";
                div.innerHTML = `<img src="${s.cover_url}" class="w-32 h-32 rounded-[30px] shadow-2xl object-cover border border-white/5"> <div class="flex-1 min-w-0"><p class="text-4xl font-[900] truncate text-white italic leading-tight">${s.title}</p><p class="text-xl text-[#d4af37] uppercase font-black tracking-widest mt-2 truncate">${s.user_name}</p></div>`;
                container.appendChild(div);
            });
        }

        function initSystem() {
            setInterval(monitor, 2000);
            setInterval(() => { if(durationMs > 0) { localProgressMs += 1000; document.getElementById('tv-progress').style.width = (localProgressMs/durationMs*100)+'%'; document.getElementById('tv-current-time').innerText = format(localProgressMs); } }, 1000);
            supabaseClient.channel('q_tv').on('postgres_changes', { event: '*', schema: 'public', table: 'queue' }, fetchQueue).subscribe();
            fetchQueue();
        }

        const code = new URLSearchParams(window.location.search).get('code');
        if (code) { document.getElementById('lock-screen').style.display = 'none'; document.getElementById('main-content').style.opacity = '1'; exchangeCode(code); initSystem(); }
        lucide.createIcons();
    </script>
</body>
</html>
