<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Jukebox - TV Main System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000; color: white; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        #bg-blur {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(100px) brightness(0.3); transform: scale(1.2);
            z-index: -1; transition: background-image 2s ease-in-out;
        }

        .glass-panel { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .progress-fill { background: #ffffff; height: 100%; border-radius: 99px; transition: width 1s linear; box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
        
        /* Menu de Admin escondido */
        .admin-trigger { position: fixed; top: 0; left: 0; width: 60px; height: 60px; z-index: 40; }
        .admin-menu { position: fixed; top: 20px; left: 20px; z-index: 50; display: none; }
        .admin-trigger:hover + .admin-menu, .admin-menu:hover { display: flex; }

        /* Overlay da Password */
        #lock-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
    </style>
</head>
<body class="h-screen flex flex-col p-16 relative">

    <div id="lock-screen">
        <h2 class="text-neonPink text-4xl font-black italic mb-8 tracking-tighter" style="text-shadow: 0 0 15px #ff00ff">NEON JUKEBOX 🔐</h2>
        <input type="password" id="passInput" placeholder="Password do Sistema" class="bg-white/10 border border-white/20 rounded-2xl px-6 py-4 text-center text-2xl outline-none focus:border-white transition-all">
        <button onclick="checkPass()" class="mt-6 bg-white text-black px-10 py-3 rounded-full font-bold hover:scale-105 transition-all">ENTRAR</button>
        <p id="errorMsg" class="text-red-500 mt-4 hidden">Password incorreta!</p>
    </div>

    <div id="bg-blur"></div>

    <div class="admin-trigger"></div>
    <div class="admin-menu flex-col gap-3 bg-black/90 p-6 rounded-3xl border border-white/10 backdrop-blur-xl">
        <button onclick="loginSpotify()" class="bg-[#1DB954] text-black px-6 py-2 rounded-full font-black text-[10px]">CONECTAR SPOTIFY</button>
        <button id="auto-btn" onclick="toggleAutoMode()" class="bg-white/10 text-white px-6 py-2 rounded-full font-bold text-[10px]">AUTO-NEXT: OFF</button>
        <button onclick="localStorage.clear(); location.reload();" class="text-red-500 text-[10px] mt-2">LOGOUT TOTAL</button>
    </div>

    <div id="main-content" class="flex-1 flex items-center gap-20 mb-24 opacity-0 transition-opacity duration-1000">
        <div class="shrink-0">
            <img id="tv-cover" src="" class="w-[500px] h-[500px] md:w-[580px] md:h-[580px] rounded-[40px] shadow-[0_40px_100px_rgba(0,0,0,0.9)] border border-white/10 object-cover">
        </div>

        <div class="flex-1 flex flex-col justify-center overflow-hidden">
            <h1 id="tv-title" class="text-8xl md:text-9xl font-[900] tracking-tighter leading-[1] mb-8 line-clamp-2">...</h1>
            <p id="tv-artist" class="text-5xl md:text-6xl text-white/50 font-medium mb-12 italic">Carregando...</p>
            <div id="tv-suggester-box" class="hidden inline-flex items-center gap-5 px-10 py-5 glass-panel rounded-3xl w-fit border-l-8 border-l-white">
                <span class="text-2xl font-black uppercase tracking-widest text-white/80">PEDIDO DE: <span id="tv-suggester" class="text-white">---</span></span>
            </div>
        </div>

        <div class="w-[420px] glass-panel rounded-[50px] p-12 h-full max-h-[750px] flex flex-col">
            <h2 class="text-xl font-black uppercase tracking-[0.3em] text-white/30 mb-10 border-b border-white/10 pb-8 italic">Próximas</h2>
            <div id="tv-queue-list" class="flex flex-col gap-10 overflow-y-auto"></div>
        </div>
    </div>

    <div class="w-full max-w-[95%] mx-auto mt-auto mb-4">
        <div class="flex justify-between items-end mb-8 px-4">
            <span id="tv-current-time" class="text-4xl font-bold font-mono opacity-30">0:00</span>
            <span id="tv-total-time" class="text-4xl font-bold font-mono opacity-30">0:00</span>
        </div>
        <div class="bg-white/15 h-4 rounded-full relative overflow-hidden">
            <div id="tv-progress" class="progress-fill" style="width: 0%"></div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://tgbyxogyrugjfggugigf.supabase.co';
        const supabaseKey = 'sb_publishable_MJFbecAQa8GZ4LdNb5ruew_9N9bg2ro';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const spotifyClientId = '3351b90e625048618d7f976a4f4b5a5a';
        let spotifyAccessToken = localStorage.getItem('spotify_token');
        let autoMode = false;
        let isProcessingAuto = false;
        let lastInjectedUri = null;
        let durationMs = 0;
        let localProgressMs = 0;
        const redirectUri = window.location.href.split('?')[0].split('#')[0];

        // --- SISTEMA DE PASSWORD ---
        const TV_PASS = "1234"; // <--- TUA PASSWORD AQUI
        function checkPass() {
            const val = document.getElementById('passInput').value;
            if(val === TV_PASS) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
                initSystem();
            } else {
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        }

        // --- SPOTIFY S256 ---
        async function loginSpotify() {
            const verifier = Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b => b.toString(16).padStart(2, '0')).join('');
            localStorage.setItem('code_verifier', verifier);
            const encoder = new TextEncoder();
            const data = encoder.encode(verifier);
            const digest = await window.crypto.subtle.digest('SHA-256', data);
            const challenge = btoa(String.fromCharCode.apply(null, new Uint8Array(digest))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            window.location.href = `https://accounts.spotify.com/authorize?client_id=${spotifyClientId}&response_type=code&redirect_uri=${encodeURIComponent(redirectUri)}&scope=user-modify-playback-state%20user-read-playback-state%20user-read-currently-playing&code_challenge_method=S256&code_challenge=${challenge}`;
        }

        async function exchangeCode(code) {
            const verifier = localStorage.getItem('code_verifier');
            const params = new URLSearchParams({ client_id: spotifyClientId, grant_type: 'authorization_code', code, redirect_uri: redirectUri, code_verifier: verifier });
            const res = await fetch('https://accounts.spotify.com/api/token', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params });
            const data = await res.json();
            if (data.access_token) { localStorage.setItem('spotify_token', data.access_token); location.reload(); }
        }

        // --- BROADCAST & MONITOR ---
        async function monitor() {
            if (!spotifyAccessToken) return;
            try {
                const res = await fetch("https://api.spotify.com/v1/me/player", { headers: { 'Authorization': 'Bearer ' + spotifyAccessToken } });
                if (res.status === 200) {
                    const data = await res.json();
                    if (!data.item) return;

                    localProgressMs = data.progress_ms;
                    durationMs = data.item.duration_ms;

                    await supabaseClient.from('playback_status').upsert({
                        id: 1, title: data.item.name, artist: data.item.artists[0].name,
                        cover_url: data.item.album.images[0].url, progress_ms: data.progress_ms,
                        duration_ms: data.item.duration_ms, user_name: (lastInjectedUri === data.item.uri) ? (localStorage.getItem('last_suggester') || "Sugerida") : "Spotify"
                    });

                    updateUI(data.item.name, data.item.artists[0].name, data.item.album.images[0].url, data.progress_ms, data.item.duration_ms, (lastInjectedUri === data.item.uri));

                    if (autoMode) {
                        const timeLeft = durationMs - localProgressMs;
                        if (timeLeft > 20000) isProcessingAuto = false;
                        if (timeLeft < 15000 && timeLeft > 5000 && !isProcessingAuto) {
                            isProcessingAuto = true;
                            playNext();
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function playNext() {
            const { data } = await supabaseClient.from('queue').select('*').eq('status', 'pending').order('votes', { ascending: false }).limit(1);
            if (data && data.length > 0) {
                const song = data[0];
                const res = await fetch(`https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(song.spotify_uri)}`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + spotifyAccessToken } });
                if (res.ok) {
                    lastInjectedUri = song.spotify_uri;
                    localStorage.setItem('last_suggester', song.user_name);
                    await supabaseClient.from('queue').update({ status: 'played' }).eq('id', song.id);
                }
            }
        }

        function updateUI(title, artist, cover, progress, duration, suggester) {
            document.getElementById('tv-title').innerText = title;
            document.getElementById('tv-artist').innerText = artist;
            document.getElementById('tv-cover').src = cover;
            document.getElementById('bg-blur').style.backgroundImage = `url('${cover}')`;
            document.getElementById('tv-total-time').innerText = format(duration);
            if (suggester) {
                document.getElementById('tv-suggester-box').classList.remove('hidden');
                document.getElementById('tv-suggester').innerText = localStorage.getItem('last_suggester');
            } else { document.getElementById('tv-suggester-box').classList.add('hidden'); }
        }

        function format(ms) { const min = Math.floor(ms / 60000); const sec = Math.floor((ms % 60000) / 1000); return min + ":" + (sec < 10 ? '0' : '') + sec; }
        function toggleAutoMode() { autoMode = !autoMode; document.getElementById('auto-btn').innerText = `AUTO-NEXT: ${autoMode ? 'ON' : 'OFF'}`; document.getElementById('auto-btn').classList.toggle('bg-green-600', autoMode); }

        async function fetchQueue() {
            const { data } = await supabaseClient.from('queue').select('*').eq('status', 'pending').order('votes', { ascending: false }).limit(5);
            const container = document.getElementById('tv-queue-list'); container.innerHTML = "";
            (data || []).forEach(song => {
                const div = document.createElement('div'); div.className = "flex items-center gap-8 opacity-80";
                div.innerHTML = `<img src="${song.cover_url}" class="w-24 h-24 rounded-3xl object-cover shadow-2xl"><div><p class="text-3xl font-bold truncate">${song.title}</p><p class="text-lg text-white/40 uppercase font-bold tracking-[0.2em] mt-1">${song.user_name}</p></div>`;
                container.appendChild(div);
            });
        }

        function initSystem() {
            setInterval(monitor, 2000);
            setInterval(() => { 
                localProgressMs += 1000; 
                if(durationMs > 0) {
                    document.getElementById('tv-progress').style.width = (localProgressMs/durationMs*100)+'%'; 
                    document.getElementById('tv-current-time').innerText = format(localProgressMs);
                }
            }, 1000);
            supabaseClient.channel('q_tv').on('postgres_changes', { event: '*', schema: 'public', table: 'queue' }, fetchQueue).subscribe();
            fetchQueue();
        }

        // Verifica se volta do login do Spotify
        const code = new URLSearchParams(window.location.search).get('code');
        if (code) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-content').style.opacity = '1';
            exchangeCode(code);
            initSystem();
        }

        lucide.createIcons();
    </script>
</body>
</html>
