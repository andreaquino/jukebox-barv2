<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portinha TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Bebas+Neue&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --gold-dim: #8a6d1d;
            --crimson: #8B0000;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            background: #000;
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Crimson Text', serif;
        }

        /* ── AMBIENT BACKGROUND ── */
        #bg-blur {
            position: fixed; inset: -15%;
            background-size: cover; background-position: center;
            filter: blur(120px) brightness(0.22) saturate(1.8);
            z-index: 1;
            transition: background-image 3s ease-in-out;
            animation: ambient-drift 50s infinite alternate ease-in-out;
            transform-origin: center center;
        }

        @keyframes ambient-drift {
            0%   { transform: scale(1.1) translate(0%, 0%) rotate(0deg); }
            33%  { transform: scale(1.3) translate(-4%, 3%) rotate(1.5deg); }
            66%  { transform: scale(1.15) translate(3%, -4%) rotate(-1deg); }
            100% { transform: scale(1.1) translate(0%, 0%) rotate(0deg); }
        }

        /* Deep vignette — more dramatic gradient */
        #vignette {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
            background:
                radial-gradient(ellipse at 30% 50%, transparent 25%, rgba(0,0,0,0.55) 70%),
                linear-gradient(to right, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.5) 55%, rgba(0,0,0,0.97) 100%),
                linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 35%),
                linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 20%);
        }

        /* Grain texture overlay */
        #grain {
            position: fixed; inset: 0; z-index: 3; pointer-events: none; opacity: 0.045;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        /* ── LOCK SCREEN ── */
        #lock-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 2rem;
        }

        .lock-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 7rem;
            letter-spacing: 0.08em;
            color: var(--gold);
            text-shadow: 0 0 80px rgba(212,175,55,0.3);
            line-height: 1;
        }

        .lock-sub {
            font-family: 'Crimson Text', serif;
            font-size: 1.1rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(212,175,55,0.45);
        }

        .lock-input {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 12px;
            padding: 1rem 2rem;
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 0.5em;
            color: #fff;
            outline: none;
            width: 20vw;
            min-width: 200px;
            transition: border-color 0.3s;
        }
        .lock-input:focus { border-color: rgba(212,175,55,0.6); }

        .lock-btn {
            background: var(--gold);
            color: #000;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 0.15em;
            border: none;
            border-radius: 10px;
            padding: 0.7rem 2.5rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .lock-btn:hover { opacity: 0.85; transform: scale(1.02); }

        /* ── ADMIN TRIGGER ── */
        .admin-trigger { position: fixed; top: 0; left: 0; width: 120px; height: 120px; z-index: 10001; cursor: default; }
        .admin-menu {
            position: fixed; top: 30px; left: 30px; z-index: 10002; display: none;
            background: rgba(5,2,2,0.97);
            border: 1px solid rgba(212,175,55,0.2);
            padding: 2rem; border-radius: 20px;
            flex-direction: column; gap: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            min-width: 260px;
        }
        .admin-trigger:hover + .admin-menu,
        .admin-menu:hover { display: flex; }

        .admin-btn-spotify {
            background: #1DB954; color: #000;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.1em;
            border: none; border-radius: 50px; padding: 0.6rem 1.5rem; cursor: pointer;
            transition: opacity 0.2s;
        }
        .admin-btn-spotify:hover { opacity: 0.85; }

        .admin-btn-auto {
            background: rgba(255,255,255,0.07); color: #fff;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.1em;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50px;
            padding: 0.6rem 1.5rem; cursor: pointer; transition: all 0.2s;
        }

        .admin-btn-reset {
            background: none; color: rgba(255,80,80,0.6);
            font-family: 'Crimson Text', serif; font-size: 0.85rem;
            letter-spacing: 0.1em; text-transform: uppercase;
            border: none; cursor: pointer; padding: 0.3rem;
        }

        /* ── MAIN LAYOUT ── */
        #main-content {
            position: relative; z-index: 10;
            display: grid;
            grid-template-columns: 1fr 28vw;
            grid-template-rows: 1fr auto;
            height: 100vh; width: 100vw;
            padding: 4vh 4vw;
            gap: 3vw;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        /* ── LEFT COLUMN: NOW PLAYING ── */
        #now-playing-col {
            grid-column: 1; grid-row: 1 / 3;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding-bottom: 1vh;
            min-width: 0; /* CORREÇÃO CRÍTICA: Impede que a grelha expanda infinitamente */
        }

        /* Album art — large, floating */
        #album-wrap {
            position: relative;
            width: 22vw; height: 22vw;
            margin-bottom: 3vh;
            flex-shrink: 0;
        }

        #tv-cover {
            width: 100%; height: 100%;
            border-radius: 1.5vw;
            object-fit: cover;
            position: relative; z-index: 2;
            transition: all 1.5s ease;
            box-shadow:
                0 30px 80px rgba(0,0,0,0.7),
                0 0 0 1px rgba(255,255,255,0.07);
        }

        /* Gold corner accents on album */
        #album-wrap::before,
        #album-wrap::after {
            content: '';
            position: absolute;
            width: 2.5vw; height: 2.5vw;
            z-index: 3;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.5;
        }
        #album-wrap::before {
            top: -0.5vw; left: -0.5vw;
            border-width: 2px 0 0 2px;
            border-radius: 4px 0 0 0;
        }
        #album-wrap::after {
            bottom: -0.5vw; right: -0.5vw;
            border-width: 0 2px 2px 0;
            border-radius: 0 0 4px 0;
        }

        /* Suggester badge */
        #tv-suggester-box {
            display: none;
            align-items: center; gap: 0.6rem;
            padding: 0.35rem 1.1rem 0.35rem 0.6rem;
            background: rgba(212,175,55,0.1);
            border: 1px solid rgba(212,175,55,0.25);
            border-radius: 50px;
            width: fit-content;
            margin-bottom: 1.4vh;
            max-width: 100%; /* CORREÇÃO: Bloqueia expansão */
        }

        .suggester-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--gold);
            animation: pulse-dot 2s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.7); }
        }

        /* ── MARQUEE TITLE ── */
        #tv-title-wrap {
            overflow: hidden;
            margin-bottom: 0.5vh;
            position: relative;
            /* fade edges via mask */
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 4%, black 88%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 4%, black 88%, transparent 100%);
            width: 100%;
        }

        /* mask only active when scrolling */
        #tv-title-wrap.static {
            -webkit-mask-image: none;
            mask-image: none;
        }

        #tv-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-style: italic;
            line-height: 0.95;
            color: #fff;
            white-space: nowrap;
            display: inline-block;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #tv-artist {
            font-family: 'Crimson Text', serif;
            font-size: 2.2vw;
            font-style: italic;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.02em;
            margin-bottom: 2.5vh;
            white-space: nowrap;      /* CORREÇÃO: Não quebra a linha */
            overflow: hidden;         /* CORREÇÃO: Corta o excesso */
            text-overflow: ellipsis;  /* CORREÇÃO: Mete reticências */
            width: 100%;
        }

        /* Progress bar */
        #progress-wrap { width: 100%; }

        .progress-times {
            display: flex; justify-content: space-between;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1vw;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.35);
            margin-bottom: 0.6vh;
        }

        .progress-track {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.12);
            border-radius: 99px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, rgba(212,175,55,0.6), var(--gold));
            border-radius: 99px;
            transition: width 1s linear;
            position: relative;
        }

        /* Glint on progress bar */
        .progress-fill::after {
            content: '';
            position: absolute; right: 0; top: 50%;
            transform: translateY(-50%);
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--gold-light);
            box-shadow: 0 0 8px var(--gold);
        }

        /* ── RIGHT COLUMN ── */
        #right-col {
            grid-column: 2; grid-row: 1 / 3;
            display: flex; flex-direction: column;
            gap: 2vh;
            min-width: 0; /* Segurança extra */
        }

        /* Queue panel */
        #queue-panel {
            flex: 1;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 1.5vw;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(40px);
            padding: 2vw 2vw 1.5vw;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .queue-header {
            display: flex; align-items: center; gap: 0.8rem;
            margin-bottom: 2.5vh;
            padding-bottom: 1.5vh;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .queue-header-icon {
            width: 1.4vw; height: 1.4vw;
            opacity: 0.35;
        }

        .queue-header-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1vw;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.35);
        }

        #tv-queue-list {
            display: flex; flex-direction: column;
            gap: 1.8vh;
            overflow-y: auto;
            flex: 1;
        }

        #tv-queue-list::-webkit-scrollbar { display: none; }

        .queue-item {
            display: flex; align-items: center; gap: 1.2vw;
            opacity: 0;
            animation: fade-slide-in 0.5s forwards;
        }

        @keyframes fade-slide-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .queue-cover {
            width: 3.2vw; height: 3.2vw;
            border-radius: 0.4vw;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .queue-track { font-family: 'Crimson Text', serif; font-size: 1.1vw; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
        
        .queue-meta { 
            font-family: 'Bebas Neue', sans-serif; font-size: 0.75vw; letter-spacing: 0.18em; color: var(--gold); opacity: 0.7; margin-top: 0.15rem; 
            white-space: nowrap;      /* CORREÇÃO: Protege nomes grandes na fila automática */
            overflow: hidden;         /* CORREÇÃO */
            text-overflow: ellipsis;  /* CORREÇÃO */
        }

        /* QR / CTA panel */
        #qr-panel {
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 1.5vw;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(40px);
            padding: 1.8vw 2vw;
            display: flex; align-items: center; gap: 2vw;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        /* Gold shimmer line on QR panel top */
        #qr-panel::before {
            content: '';
            position: absolute; top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(212,175,55,0.5), transparent);
        }

        #qrcode-container {
            background: #fff;
            padding: 0.7vw;
            border-radius: 0.8vw;
            flex-shrink: 0;
        }

        .qr-cta { flex: 1; min-width: 0; }

        .qr-line1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1vw;
            letter-spacing: 0.3em;
            color: var(--gold);
            opacity: 0.7;
            margin-bottom: 0.3rem;
        }

        .qr-line2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4vw;
            font-weight: 900;
            font-style: italic;
            line-height: 0.95;
            color: #fff;
            text-shadow: 0 4px 16px rgba(0,0,0,0.6);
        }

        .qr-line2 span {
            color: var(--gold);
        }

        /* ── PORTINHA WORDMARK bottom-left ── */
        #wordmark {
            position: fixed;
            bottom: 3vh; left: 4vw;
            z-index: 11;
            display: flex; align-items: center; gap: 0.8rem;
        }

        .wordmark-bar {
            width: 2px; height: 2.2rem;
            background: linear-gradient(to bottom, transparent, var(--gold), transparent);
            opacity: 0.5;
        }

        .wordmark-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1vw;
            letter-spacing: 0.5em;
            color: var(--gold);
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-logo">PORTINHA</div>
        <div class="lock-sub">Ecrã do Bar</div>
        <input type="password" id="passInput" class="lock-input" placeholder="••••" maxlength="6"
               onkeydown="if(event.key==='Enter') checkPass()">
        <button class="lock-btn" onclick="checkPass()">ENTRAR</button>
    </div>

    <div class="admin-trigger"></div>
    <div class="admin-menu">
        <button class="admin-btn-spotify" onclick="loginSpotify()">⚡ CONECTAR SPOTIFY</button>
        <button id="auto-btn" class="admin-btn-auto" onclick="toggleAutoMode()">AUTO-NEXT: OFF</button>
        <hr style="border-color:rgba(255,255,255,0.07); margin: 0.3rem 0;">
        <button class="admin-btn-reset" onclick="localStorage.clear(); location.reload();">Reset / Logout</button>
    </div>

    <div id="bg-blur"></div>
    <div id="vignette"></div>
    <div id="grain"></div>

    <div id="wordmark">
        <div class="wordmark-bar"></div>
        <div class="wordmark-text">PORTINHA</div>
    </div>

    <div id="main-content">

        <div id="now-playing-col">

            <div id="album-wrap">
                <img id="tv-cover" src="" alt="Capa do álbum">
            </div>

            <div id="tv-suggester-box">
                <div class="suggester-dot"></div>
                <span style="font-family:'Bebas Neue',sans-serif; font-size:0.85vw; letter-spacing:0.2em; color:rgba(255,255,255,0.5); display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;">
                    PEDIDO: <span id="tv-suggester" style="color:var(--gold);">---</span>
                </span>
            </div>

            <div id="tv-title-wrap">
                <span id="tv-title">...</span>
            </div>
            <p id="tv-artist">A carregar...</p>

            <div id="progress-wrap">
                <div class="progress-times">
                    <span id="tv-current-time">0:00</span>
                    <span id="tv-total-time">0:00</span>
                </div>
                <div class="progress-track">
                    <div id="tv-progress" class="progress-fill" style="width:0%"></div>
                </div>
            </div>
        </div>

        <div id="right-col">

            <div id="queue-panel">
                <div class="queue-header">
                    <svg class="queue-header-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" d="M4 6h16M4 12h16M4 18h10"/>
                    </svg>
                    <span class="queue-header-label">A Seguir</span>
                </div>
                <div id="tv-queue-list"></div>
            </div>

            <div id="qr-panel">
                <div id="qrcode-container"></div>
                <div class="qr-cta">
                    <div class="qr-line1">Faz scan e pede</div>
                    <div class="qr-line2">A Tua<br><span>Música</span></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        /* ── CONFIG ── */
        const supabaseUrl = 'https://nebcunpezefmblvjyzqt.supabase.co';
        const supabaseKey = 'sb_publishable_MNiMt4qcMQ1H2GvEm54TMA_yk8gN7fb';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        const spotifyClientId = '3351b90e625048618d7f976a4f4b5a5a';

        let spotifyAccessToken = localStorage.getItem('spotify_token');
        let refreshToken = localStorage.getItem('refresh_token');
        let expiresAt = localStorage.getItem('expires_at');
        let autoMode = false;
        let isProcessingAuto = false;
        let durationMs = 0; let localProgressMs = 0;
        let lastQueueState = "";

        const redirectUri = window.location.href.split('?')[0].split('#')[0];

        /* ── MARQUEE TITLE ── */
        function adjustTitle() {
            const title = document.getElementById('tv-title');
            const wrap  = document.getElementById('tv-title-wrap');

            title.style.animation = 'none';
            title.style.fontSize  = '6.5vw';
            wrap.classList.remove('static');

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    const wrapW  = wrap.clientWidth;
                    const titleW = title.scrollWidth;

                    if (titleW <= wrapW) {
                        wrap.classList.add('static');
                        return;
                    }

                    const overflow  = titleW - wrapW;
                    const scrollSec = overflow / 80;
                    const pauseSec  = 2.5;
                    const totalSec  = scrollSec + pauseSec * 2;
                    const p1 = (pauseSec / totalSec * 100).toFixed(2);
                    const p2 = ((pauseSec + scrollSec) / totalSec * 100).toFixed(2);
                    const p3 = (parseFloat(p2) + 0.001).toFixed(3);

                    title.style.setProperty('--scroll-dist', `-${overflow}px`);

                    let dynStyle = document.getElementById('dyn-marquee');
                    if (!dynStyle) { dynStyle = document.createElement('style'); dynStyle.id = 'dyn-marquee'; document.head.appendChild(dynStyle); }
                    dynStyle.textContent = `@keyframes marquee-scroll {
                        0%      { transform: translateX(0); }
                        ${p1}%  { transform: translateX(0); }
                        ${p2}%  { transform: translateX(var(--scroll-dist)); }
                        ${p3}%  { transform: translateX(0); }
                        100%    { transform: translateX(0); }
                    }`;

                    title.style.animation = `marquee-scroll ${totalSec}s ease-in-out infinite`;
                });
            });
        }

        /* ── LOCK ── */
        function checkPass() {
            if (document.getElementById('passInput').value === "1234") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
                generateQR();
                initSystem();
            }
        }

        /* ── QR ── */
        function generateQR() {
            const indexUrl = window.location.href.replace('tv.html', 'index.html').replace('tv2.html', 'index2.html');
            document.getElementById("qrcode-container").innerHTML = "";
            new QRCode(document.getElementById("qrcode-container"), {
                text: indexUrl, width: 120, height: 120,
                colorDark: "#000", colorLight: "#fff"
            });
        }

        /* ── SPOTIFY AUTH ── */
        async function loginSpotify() {
            const verifier = Array.from(crypto.getRandomValues(new Uint8Array(32)))
                .map(b => b.toString(16).padStart(2,'0')).join('');
            localStorage.setItem('code_verifier', verifier);
            const challenge = btoa(String.fromCharCode.apply(null, new Uint8Array(
                await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier))
            ))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
            const scopes = 'user-modify-playback-state user-read-playback-state user-read-currently-playing';
            window.location.href = `https://accounts.spotify.com/authorize?client_id=${spotifyClientId}&response_type=code&redirect_uri=${encodeURIComponent(redirectUri)}&scope=${encodeURIComponent(scopes)}&code_challenge_method=S256&code_challenge=${challenge}`;
        }

        async function exchangeCode(code) {
            const params = new URLSearchParams({
                client_id: spotifyClientId, grant_type: 'authorization_code',
                code, redirect_uri: redirectUri,
                code_verifier: localStorage.getItem('code_verifier')
            });
            const res  = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params
            });
            const data = await res.json();
            if (data.access_token) {
                localStorage.setItem('spotify_token',  data.access_token);
                localStorage.setItem('refresh_token',  data.refresh_token);
                localStorage.setItem('expires_at', Math.floor(Date.now()/1000) + data.expires_in);
                window.location.href = redirectUri;
            }
        }

        async function refreshTokens() {
            if (!refreshToken) return;
            const params = new URLSearchParams({
                client_id: spotifyClientId, grant_type: 'refresh_token', refresh_token: refreshToken
            });
            const res  = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: params
            });
            const data = await res.json();
            if (data.access_token) {
                spotifyAccessToken = data.access_token;
                localStorage.setItem('spotify_token', data.access_token);
                localStorage.setItem('expires_at', Math.floor(Date.now()/1000) + data.expires_in);
            }
        }

        async function disableRepeat() {
            if (!spotifyAccessToken) return;
            await fetch("https://api.spotify.com/v1/me/player/repeat?state=off", {
                method: 'PUT', headers: { 'Authorization': 'Bearer ' + spotifyAccessToken }
            });
        }

        /* ── MONITOR PLAYBACK ── */
        async function monitor() {
            if (!spotifyAccessToken) return;
            if (expiresAt && (Math.floor(Date.now()/1000) > (expiresAt - 300))) await refreshTokens();
            try {
                const res = await fetch("https://api.spotify.com/v1/me/player/currently-playing", {
                    headers: { 'Authorization': 'Bearer ' + spotifyAccessToken }
                });
                if (res.status === 200) {
                    const data = await res.json(); if (!data.item) return;

                    if (localStorage.getItem('current_uri') !== data.item.uri) {
                        isProcessingAuto = false;
                        localStorage.setItem('current_uri', data.item.uri);
                        disableRepeat();
                    }

                    localProgressMs = data.progress_ms; durationMs = data.item.duration_ms;
                    const isSuggester = (localStorage.getItem('last_uri') === data.item.uri);
                    const currentUser = isSuggester ? localStorage.getItem('last_user') : "Spotify";

                    await supabaseClient.from('playback_status').upsert({
                        id: 1, title: data.item.name, artist: data.item.artists[0].name,
                        cover_url: data.item.album.images[0].url,
                        progress_ms: data.progress_ms, duration_ms: data.item.duration_ms, user_name: currentUser
                    });

                    document.getElementById('tv-title').innerText = data.item.name;
                    adjustTitle();
                    document.getElementById('tv-artist').innerText = data.item.artists[0].name;
                    document.getElementById('tv-cover').src = data.item.album.images[0].url;
                    document.getElementById('bg-blur').style.backgroundImage = `url('${data.item.album.images[0].url}')`;
                    document.getElementById('tv-total-time').innerText = format(durationMs);

                    const suggBox = document.getElementById('tv-suggester-box');
                    if (isSuggester) {
                        suggBox.style.display = 'flex';
                        document.getElementById('tv-suggester').innerText = currentUser;
                    } else {
                        suggBox.style.display = 'none';
                    }

                    if (autoMode && durationMs > 0 && (durationMs - localProgressMs < 15000) && !isProcessingAuto) {
                        isProcessingAuto = true;
                        prepareNextFromQueue();
                    }
                }
            } catch(e) { console.error(e); }
        }

        /* ── QUEUE ── */
        async function prepareNextFromQueue() {
            const { data } = await supabaseClient.from('queue').select('*')
                .eq('status', 'pending').order('votes', { ascending: false }).limit(1);
            if (data?.length > 0) {
                const s = data[0];
                await fetch(`https://api.spotify.com/v1/me/player/queue?uri=${encodeURIComponent(s.spotify_uri)}`, {
                    method: 'POST', headers: { 'Authorization': 'Bearer ' + spotifyAccessToken }
                });
                localStorage.setItem('last_uri',  s.spotify_uri);
                localStorage.setItem('last_user', s.user_name);
                await supabaseClient.from('queue').update({ status: 'played' }).eq('id', s.id);
            }
        }

        async function fetchQueue() {
            const { data: suggestions } = await supabaseClient.from('queue').select('*')
                .eq('status', 'pending').order('votes', { ascending: false }).limit(6);
            let currentState = "empty";
            let qData = null;

            if (suggestions?.length > 0) {
                currentState = "supa_" + suggestions.map(s => s.id + "_" + s.votes).join("|");
            } else if (spotifyAccessToken) {
                try {
                    const res = await fetch("https://api.spotify.com/v1/me/player/queue", {
                        headers: { 'Authorization': 'Bearer ' + spotifyAccessToken }
                    });
                    if (res.status === 200) {
                        qData = await res.json();
                        if (qData.queue) currentState = "spot_" + qData.queue.slice(0,6).map(t => t.uri).join("|");
                    }
                } catch(e) {}
            }

            if (currentState === lastQueueState) return;
            lastQueueState = currentState;

            const container = document.getElementById('tv-queue-list');
            container.innerHTML = "";

            const renderItem = (coverSrc, title, meta, delay) => {
                const div = document.createElement('div');
                div.className = 'queue-item';
                div.style.animationDelay = delay + 'ms';
                div.innerHTML = `
                    <img src="${coverSrc}" class="queue-cover" alt="">
                    <div style="flex:1;min-width:0;">
                        <div class="queue-track">${title}</div>
                        <div class="queue-meta">${meta}</div>
                    </div>`;
                container.appendChild(div);
            };

            if (suggestions?.length > 0) {
                suggestions.forEach((s, i) => renderItem(s.cover_url, s.title, 'Pedido: ' + s.user_name, i * 80));
            } else if (qData?.queue) {
                qData.queue.slice(0, 6).forEach((t, i) => renderItem(t.album.images[0].url, t.name, 'Playlist Portinha', i * 80));
            }
        }

        /* ── HELPERS ── */
        function toggleAutoMode() {
            autoMode = !autoMode;
            const btn = document.getElementById('auto-btn');
            btn.innerText = `AUTO-NEXT: ${autoMode ? 'ON' : 'OFF'}`;
            btn.style.color = autoMode ? '#1DB954' : 'white';
        }

        function format(ms) {
            const min = Math.floor(ms / 60000);
            const sec = Math.floor((ms % 60000) / 1000);
            return min + ":" + (sec < 10 ? '0' : '') + sec;
        }

        /* ── INIT ── */
        function initSystem() {
            setInterval(monitor, 2000);
            setInterval(() => {
                if (durationMs > 0) {
                    localProgressMs += 1000;
                    document.getElementById('tv-progress').style.width = (localProgressMs / durationMs * 100) + '%';
                    document.getElementById('tv-current-time').innerText = format(localProgressMs);
                }
            }, 1000);
            supabaseClient.channel('q_tv')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'queue' }, fetchQueue)
                .subscribe();
            setInterval(fetchQueue, 10000);
            fetchQueue();
        }

        const code = new URLSearchParams(window.location.search).get('code');
        if (code) { exchangeCode(code); }
    </script>
</body>
</html>
