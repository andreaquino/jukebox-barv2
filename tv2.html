<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portinha TV - O Cérebro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #f3e5ab; overflow: hidden; }
        .progress-bar { transition: width 1s linear; box-shadow: 0 0 20px #d4af37; }
        .bg-gold-gradient { background: linear-gradient(180deg, #d4af37 0%, #8a6d1d 100%); }
    </style>
</head>
<body class="p-12 h-screen flex flex-col gap-10">

    <div class="flex gap-16 items-center flex-1">
        <div class="relative">
            <div class="absolute -inset-4 bg-[#d4af37]/20 rounded-full blur-3xl animate-pulse"></div>
            <img id="tv-cover" src="https://via.placeholder.com/500" class="relative w-[550px] h-[550px] rounded-[40px] shadow-2xl object-cover border-4 border-white/5">
        </div>

        <div class="flex-1">
            <p class="text-[#d4af37] font-black tracking-[0.5em] uppercase text-2xl mb-6">No Ar na Portinha</p>
            <h1 id="tv-title" class="text-9xl font-black text-white leading-none mb-8 tracking-tighter uppercase italic">Sincronizando...</h1>
            <h2 id="tv-artist" class="text-6xl font-medium text-[#d4af37]/70 italic mb-16">Aguarda sinal...</h2>

            <div class="w-full bg-white/10 h-8 rounded-full p-1.5 border border-white/5 backdrop-blur-md">
                <div id="tv-progress" class="bg-gold-gradient h-full rounded-full progress-bar" style="width: 0%"></div>
            </div>
            <div class="flex justify-between mt-6 text-2xl font-mono text-[#d4af37]/40">
                <span id="time-current">0:00</span>
                <span id="time-total">0:00</span>
            </div>
        </div>
    </div>

    <div class="h-1/3 w-full">
        <h3 class="text-3xl font-black uppercase italic tracking-widest text-white/20 mb-6">Próximas na Fila</h3>
        <div id="tv-queue" class="flex gap-8">
            </div>
    </div>

    <script>
        const SB_URL = 'https://tgbyxogyrugjfggugigf.supabase.co';
        const SB_KEY = 'sb_publishable_MJFbecAQa8GZ4LdNb5ruew_9N9bg2ro';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        const A_URL = atob("aHR0cHM6Ly9hY2NvdW50cy5zcG90aWZ5LmNvbS9hcGkvdG9rZW4=");
        const B_URL = atob("aHR0cHM6Ly9hcGkuc3BvdGlmeS5jb20vdjE=");
        
        let spotifyToken = null;
        let tokenExpiry = 0;
        let lastPlayedId = null;

        // 1. GESTÃO DE TOKEN (Auto-Refresh a cada 1h)
        async function getValidToken() {
            const now = Date.now();
            if (spotifyToken && now < tokenExpiry) return spotifyToken;

            try {
                const res = await fetch(A_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Authorization': 'Basic ' + btoa('3351b90e625048618d7f976a4f4b5a5a:8bc683ac2c3d4c9ba31041a857b62537')
                    },
                    body: 'grant_type=client_credentials'
                });
                const data = await res.json();
                spotifyToken = data.access_token;
                tokenExpiry = now + (data.expires_in * 1000) - 60000;
                return spotifyToken;
            } catch (e) { return null; }
        }

        // 2. O CÉREBRO: MONITORIZAÇÃO E PASSAGEM DE MÚSICA
        async function brainTick() {
            const token = await getValidToken();
            if (!token) return;

            try {
                // Tenta ler o que está a tocar
                const res = await fetch(`${B_URL}/me/player`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 200) {
                    const data = await res.json();
                    
                    // Se a música está quase a acabar (faltam 2 segundos)
                    if (data.item && (data.item.duration_ms - data.progress_ms) < 2000) {
                        checkNextInQueue();
                    }

                    const status = {
                        title: data.item.name,
                        artist: data.item.artists[0].name,
                        cover_url: data.item.album.images[0].url,
                        progress_ms: data.progress_ms,
                        duration_ms: data.item.duration_ms
                    };

                    updateUI(status);
                    // Atualiza o Supabase para os telemóveis saberem o que toca
                    await supabase.from('playback_status').update(status).eq('id', 1);

                } else {
                    // Fallback: Se o Spotify Player falhar, lê o que está no Supabase
                    const { data: supaStatus } = await supabase.from('playback_status').select('*').eq('id', 1).single();
                    if (supaStatus) updateUI(supaStatus);
                }
            } catch (e) { console.error("Brain error:", e); }
        }

        async function checkNextInQueue() {
            // Busca a música com mais votos que ainda não foi tocada
            const { data: nextSongs } = await supabase
                .from('queue')
                .select('*')
                .eq('status', 'pending')
                .order('votes', { ascending: false })
                .limit(1);

            if (nextSongs && nextSongs.length > 0) {
                const next = nextSongs[0];
                if (next.id !== lastPlayedId) {
                    console.log("Próxima música detetada:", next.title);
                    // Aqui, num cenário ideal com User Token, darias o comando "Play" ao Spotify
                    // Por agora, marcamos como "played" no Supabase
                    // await supabase.from('queue').update({ status: 'played' }).eq('id', next.id);
                    lastPlayedId = next.id;
                }
            }
        }

        function updateUI(s) {
            document.getElementById('tv-title').innerText = s.title;
            document.getElementById('tv-artist').innerText = s.artist;
            document.getElementById('tv-cover').src = s.cover_url;
            const pct = (s.progress_ms / s.duration_ms) * 100;
            document.getElementById('tv-progress').style.width = pct + '%';
            document.getElementById('time-current').innerText = formatTime(s.progress_ms);
            document.getElementById('time-total').innerText = formatTime(s.duration_ms);
        }

        function formatTime(ms) {
            const s = Math.floor(ms / 1000);
            const m = Math.floor(s / 60);
            return m + ":" + (s % 60).toString().padStart(2, '0');
        }

        async function fetchQueue() {
            const { data } = await supabase.from('queue').select('*').eq('status', 'pending').order('votes', { ascending: false }).limit(4);
            const container = document.getElementById('tv-queue');
            container.innerHTML = "";
            (data || []).forEach(song => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-6 bg-white/5 p-6 rounded-[30px] border border-white/5 flex-1 min-w-0";
                div.innerHTML = `
                    <img src="${song.cover_url}" class="w-24 h-24 rounded-2xl shadow-lg">
                    <div class="flex-1 truncate">
                        <p class="text-2xl font-bold text-white truncate">${song.title}</p>
                        <p class="text-[#d4af37] text-sm font-black uppercase tracking-widest mt-2">${song.user_name}</p>
                    </div>
                    <div class="text-4xl font-black text-[#d4af37]">❤️ ${song.votes}</div>
                `;
                container.appendChild(div);
            });
        }

        // Loops: Cérebro a cada 1s, Fila a cada 3s
        setInterval(brainTick, 1000);
        setInterval(fetchQueue, 3000);
        
        lucide.createIcons();
    </script>
</body>
</html>
