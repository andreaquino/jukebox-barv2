<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portinha - Jukebox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; color: #f3e5ab; min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('bar_background_portinha.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed; background-color: #000;
        }
        .wood-panel { background: rgba(15, 7, 5, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 24px; }
        .logo-gold { filter: brightness(0) saturate(100%) invert(80%) sepia(59%) saturate(415%) hue-rotate(352deg) brightness(89%) contrast(89%); width: 120px; opacity: 0.8; }
        .btn-gold { background: #d4af37; color: #000; font-weight: 900; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <header class="w-full max-w-lg mb-8 wood-panel p-5 border-l-4 border-[#d4af37]">
        <div class="flex gap-4 items-center">
            <img id="client-cover" src="https://via.placeholder.com/100" class="w-20 h-20 rounded-xl shadow-2xl object-cover">
            <div class="overflow-hidden flex-1">
                <p class="text-[10px] uppercase tracking-[0.2em] text-[#d4af37] font-bold mb-1">No Ar na Portinha</p>
                <h2 id="client-title" class="font-black text-xl truncate text-white leading-tight">A carregar...</h2>
                <p id="client-artist" class="text-white/50 text-sm italic">...</p>
                <div class="w-full bg-white/5 h-1.5 rounded-full mt-3 overflow-hidden">
                    <div id="client-progress" class="bg-[#d4af37] h-full" style="width: 0%;"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="w-full max-w-lg flex-1">
        <div class="relative mb-8">
            <i data-lucide="search" class="absolute left-5 top-5 text-[#d4af37]/50 w-5 h-5"></i>
            <input type="text" id="searchInput" oninput="debounceSearch()" placeholder="Pesquisa música..." class="w-full bg-black/60 border border-[#d4af37]/30 rounded-2xl pl-14 pr-6 py-5 text-white outline-none text-lg">
        </div>
        <div id="search-results" class="mb-8 flex flex-col gap-3"></div>
        <h2 class="text-2xl font-black italic text-white uppercase mb-6 tracking-tighter">Fila da Taverna</h2>
        <div id="queue-list" class="flex flex-col gap-4 pb-24"></div>
    </main>

    <footer class="mt-10 mb-12 text-center">
        <img src="logo.png" id="footer-logo" class="logo-gold mx-auto">
    </footer>

    <script>
        const SUPA_CLIENT_URL = 'https://tgbyxogyrugjfggugigf.supabase.co';
        const SUPA_CLIENT_KEY = 'sb_publishable_MJFbecAQa8GZ4LdNb5ruew_9N9bg2ro';
        const sClient = window.supabase.createClient(SUPA_CLIENT_URL, SUPA_CLIENT_KEY);
        
        const JUKE_USER = localStorage.getItem('jukebox_user_id') || 'u_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('jukebox_user_id', JUKE_USER);

        const AUTH_PATH = atob("aHR0cHM6Ly9hY2NvdW50cy5zcG90aWZ5LmNvbS9hcGkvdG9rZW4=");
        const API_PATH  = atob("aHR0cHM6Ly9hcGkuc3BvdGlmeS5jb20vdjE=");
        let currentToken = null;

        async function getAuth() {
            if (currentToken) return currentToken;
            const r = await fetch(AUTH_PATH, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Authorization': 'Basic ' + btoa('3351b90e625048618d7f976a4f4b5a5a:8bc683ac2c3d4c9ba31041a857b62537') }, 
                body: 'grant_type=client_credentials' 
            });
            const d = await r.json();
            return (currentToken = d.access_token);
        }

        // ─────────────────────────────────────────────────────────────────
        //  FILTRO — 4 camadas, funciona 100% com Client Credentials
        //  (sem nenhuma chamada extra à API do Spotify)
        // ─────────────────────────────────────────────────────────────────

        // CAMADA 1 — Palavras proibidas no TÍTULO da música
        const BANNED_TITLE_WORDS = [
            "pimba","sertanejo","pagode","arrocha","pisadinha",
            "forro","forró","brega","reggaeton","regueton",
            "funk","mtg","phonk","baile funk","passinho","tamborzão",
            "axé","axe"
        ];

        // CAMADA 2 — Padrões no NOME DO ARTISTA (regex)
        const BANNED_ARTIST_PATTERNS = [
            /^mc\s/i,       // começa com "MC "
            /\bmc\b/i,      // contém "MC" como palavra isolada
            /^dj\s/i,       // começa com "DJ "
        ];

        // CAMADA 3 — Lista negra de artistas (nome exato em lowercase)
        const BANNED_ARTISTS = new Set([
            // Pimba PT
            "quim barreiros","edgar domingues","toni carreira","tony carreira",
            "vitorino","grupo académico de coimbra","zé da viola",
            "augusto monti","paulo de carvalho","fernando de carvalho",
            // Funk BR
            "mc kevinho","mc joão","mc livinho","mc fioti","mc don juan",
            "mc g15","mc binn","mc davi","mc ryan sp","mc cabelinho",
            "mc poze do rodo","mc maneirinho","mc hariel","mc nd",
            "mc neguinho do kaxeta","mc pedrinho","mc rick","mc rodolfinho",
            // Sertanejo / Pagode BR
            "anitta","gusttavo lima","jorge & mateus","henrique & juliano",
            "maiara & maraísa","simone & simaria","marília mendonça",
            "zé neto & cristiano","humberto & ronaldo","fernando & sorocaba",
            "joão neto & frederico","matheus & kauan","pedro & thiago",
            "luan santana","michel teló","wesley safadão","léo santana",
            "xand avião","bell marques","claudinho e buchecha","thiaguinho",
            "seu jorge","belo","exaltasamba","pagodart","dilsinho",
            "ferrugem","mumuzinho","sorriso maroto","grupo revelação",
            // Reggaeton / Latin trap
            "bad bunny","j balvin","maluma","ozuna","daddy yankee",
            "anuel aa","karol g","rauw alejandro","myke towers",
            "farruko","sech","lunay","jhay cortez","nicky jam",
            "don omar","wisin & yandel","wisin","yandel","pitbull",
            "feid","paulo londra",
        ]);

        // CAMADA 4 — Palavras no NOME DO ARTISTA que denunciam o género
        const BANNED_ARTIST_WORDS = [
            "sertanejo","pagode","axé","forró","pisadinha","reggaeton","regueton",
        ];

        // Excepções — passam sempre independentemente das outras camadas
        const ALWAYS_ALLOW = [
            "nirvana","chemical brothers","radiohead","the cure","the prodigy",
            "dj shadow","dj krush","dj shadow","dj premier",  // DJs de boa reputação
        ];

        function isBanned(track) {
            const title  = track.name.toLowerCase();
            const artist = track.artists[0].name.toLowerCase();

            // Excepções explícitas
            if (ALWAYS_ALLOW.some(a => artist.includes(a))) return false;

            // Camada 1 — título
            if (BANNED_TITLE_WORDS.some(w => title.includes(w))) return true;

            // Camada 2 — padrões no artista
            if (BANNED_ARTIST_PATTERNS.some(r => r.test(artist))) return true;

            // Camada 3 — lista negra exacta
            if (BANNED_ARTISTS.has(artist)) return true;

            // Camada 4 — palavras no nome do artista
            if (BANNED_ARTIST_WORDS.some(w => artist.includes(w))) return true;

            return false;
        }

        // ─────────────────────────────────────────────────────────────────

        let sTimer;
        function debounceSearch() {
            const val = document.getElementById('searchInput').value;
            const resDiv = document.getElementById('search-results');
            if (val.length < 3) { resDiv.innerHTML = ""; return; }
            
            clearTimeout(sTimer);
            sTimer = setTimeout(async () => {
                const token = await getAuth();
                try {
                    // Pede 20 resultados para ter margem após filtrar
                    const sRes = await fetch(`${API_PATH}/search?q=${encodeURIComponent(val)}&type=track&limit=20&market=PT`, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const sData = await sRes.json();
                    if (!sData.tracks || !sData.tracks.items.length) return;

                    const filtered = sData.tracks.items.filter(t => !isBanned(t));

                    resDiv.innerHTML = "";
                    if (!filtered.length) {
                        resDiv.innerHTML = "<p class='text-[#d4af37] text-center p-4 italic font-bold'>Esta vibe não entra na Portinha! 🍷🚫</p>";
                        return;
                    }

                    filtered.slice(0, 5).forEach(song => {
                        const div = document.createElement('div');
                        div.className = "flex items-center gap-4 wood-panel p-4 active:scale-95 transition-all cursor-pointer mb-2";
                        div.onclick = () => addSong(song);
                        div.innerHTML = `
                            <img src="${song.album.images[2]?.url || song.album.images[0]?.url}" class="w-12 h-12 rounded-lg object-cover">
                            <div class="flex-1 min-w-0">
                                <p class="font-bold text-white text-sm truncate">${song.name}</p>
                                <p class="text-xs text-[#d4af37]/70 truncate">${song.artists[0].name}</p>
                            </div>
                            <i data-lucide="plus" class="text-[#d4af37] flex-shrink-0"></i>`;
                        resDiv.appendChild(div);
                    });
                    lucide.createIcons();
                } catch(e) { console.error(e); }
            }, 500);
        }

        async function addSong(song) {
            const n = prompt("Qual o teu nome?");
            if (!n) return;
            await sClient.from('queue').insert([{ 
                title: song.name, artist: song.artists[0].name,
                cover_url: song.album.images[0].url, 
                spotify_uri: song.uri,
                user_name: n.substring(0, 15),
                user_id: JUKE_USER,
                status: 'pending',
                votes: 0 
            }]);
            alert("Na fila! 🤘");
            document.getElementById('searchInput').value = "";
            document.getElementById('search-results').innerHTML = "";
        }

        async function refreshQueue() {
            const { data } = await sClient.from('queue').select('*').eq('status', 'pending').order('votes', { ascending: false });
            const list = document.getElementById('queue-list');
            list.innerHTML = "";
            (data || []).forEach(s => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-4 wood-panel p-4 mb-2";
                div.innerHTML = `
                    <img src="${s.cover_url}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-white text-sm truncate">${s.title}</p>
                        <p class="text-xs text-[#d4af37]">${s.user_name}</p>
                    </div>
                    <button onclick="voteSong('${s.id}')" class="btn-gold px-3 py-1 rounded-lg text-xs flex-shrink-0">❤️ ${s.votes}</button>`;
                list.appendChild(div);
            });
        }

        async function voteSong(id) {
            const { data } = await sClient.from('queue').select('votes').eq('id', id).single();
            await sClient.from('queue').update({ votes: (data.votes || 0) + 1 }).eq('id', id);
            refreshQueue();
        }

        async function syncBar() {
            const { data } = await sClient.from('playback_status').select('*').eq('id', 1).single();
            if (data) {
                document.getElementById('client-title').innerText = data.title;
                document.getElementById('client-artist').innerText = data.artist;
                document.getElementById('client-cover').src = data.cover_url;
                document.getElementById('client-progress').style.width = ((data.progress_ms / data.duration_ms) * 100) + '%';
            }
        }

        syncBar(); refreshQueue();
        sClient.channel('q').on('postgres_changes', { event: '*', schema: 'public', table: 'queue' }, refreshQueue).subscribe();
        sClient.channel('p').on('postgres_changes', { event: '*', schema: 'public', table: 'playback_status' }, syncBar).subscribe();
        lucide.createIcons();
    </script>
</body>
</html>
